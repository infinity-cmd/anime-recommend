<!DOCTYPE html>
<html lang="zh-CN">
{% extends 'base.html' %}
{% block content %}
<meta charset="UTF-8">
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-5 text-center">
                <h2 class="mb-3">今天看什么？</h2>
                <p class="text-muted mb-4">从 20+ 部经典动漫中，发现你的下一部心头好。</p>
                <form action="/recommend" method="get">
                    <div class="mb-3">
                        <select name="user_id" class="form-select form-select-lg" required>
                            <option value="" disabled selected>选择一位用户...</option>
                            {% for u in users %}
                            <option value="{{ u.id }}">{{ u.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">开始推荐</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
